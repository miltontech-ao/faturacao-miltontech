<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILTON TECH - Sistema de Faturação</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { 
        background: #0d1117; 
        color: #e6edf3; 
        padding: 20px;
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { 
        font-size: 32px; 
        font-weight: 800; 
        letter-spacing: 1px;
    }
    .header .milton { color: #1e90ff; }
    .header .tech { color: #00ff7f; }
    .header p { color: #8b949e; margin-top: 5px; font-size: 14px; }

    .card {
        background: #161b22;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid #30363d;
    }
    .card h2 { font-size: 18px; margin-bottom: 5px; }
    .card .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 15px; }

    .form-group { margin-bottom: 15px; }
    .form-group label { 
        display: block; 
        font-size: 14px; 
        margin-bottom: 6px; 
        color: #c9d1d9;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #e6edf3;
        font-size: 14px;
        outline: none;
    }
    .form-group input:focus {
        border-color: #1e90ff;
    }
    .form-group input::placeholder {
        color: #6e7681;
    }

    .btn {
        background: #238636;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        font-size: 15px;
    }
    .btn:hover { background: #2ea043; }

    @media print { .btn { display: none; } }
</style>
</head>
<body>

    <div class="header">
        <h1><span class="milton">MILTON</span> <span class="tech">TECH</span></h1>
        <p>Sistema de Faturação</p>
    </div>

    <div class="card">
        <h2>Dados da Empresa</h2>
        <p class="subtitle">Nome da Empresa</p>
        <div class="form-group">
            <input type="text" placeholder="Ex: Clínica Saúde Lda" id="empresa">
        </div>
        <div class="form-group">
            <label>NIF</label>
            <input type="text" placeholder="5000123456" id="nifEmpresa">
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="text" placeholder="923 000 000" id="telEmpresa">
        </div>
        <div class="form-group">
            <label>Endereço</label>
            <input type="text" placeholder="Luanda, Angola" id="endEmpresa">
        </div>
    </div>

    <div class="card">
        <h2>Dados do Cliente</h2>
        <p class="subtitle">Nome do Cliente</p>
        <div class="form-group">
            <input type="text" placeholder="" id="cliente">
        </div>
        <div class="form-group">
            <label>NIF do Cliente</label>
            <input type="text" placeholder="999999999" id="nifCliente">
        </div>
    </div>

    <button class="btn" onclick="alert('Factura salva!')">Gerar Factura</button>

<script>
    // Aqui depois podemos adicionar o cálculo, tabela de produtos, etc
</script>

</body>
</html>
