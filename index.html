<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Faturação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --azul: #0066FF; --verde: #00D26A; --bg: #0A0F1E; --card: #111827; --borda: #374151; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; padding: 15px; }
      .container { max-width: 800px; margin: 0 auto; }
      .header { text-align: center; margin-bottom: 25px; }
      .logo { font-size: 32px; font-weight: 900; color: var(--azul); }
      .logo span { color: var(--verde); }
      .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) {.grid-2 { grid-template-columns: 1fr; } }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px; background: #1F2937; border: 1px solid var(--borda); color: white; border-radius: 6px; font-size: 16px; }
        label { font-size: 13px; color: #9CA3AF; margin-bottom: 3px; display: block; }
      .btn { background: var(--verde); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; }
      .btn-azul { background: var(--azul); }
      .btn-vermelho { background: #EF4444; padding: 8px 12px; width: auto; }
      .tabela { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
      .tabela th,.tabela td { border: 1px solid var(--borda); padding: 10px; text-align: left; }
      .tabela th { background: #1F2937; }
      .total { text-align: right; font-size: 18px; margin-top: 15px; background: #1F2937; padding: 15px; border-radius: 8px; }
      .footer { margin-top: 30px; color: #6B7280; font-size: 11px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">MILTON <span>TECH</span></div>
            <div style="color: #9CA3AF; font-size: 13px;">Sistema de Faturação</div>
        </div>

        <div class="card">
            <h3>Dados da Empresa</h3>
            <div class="grid-2">
                <div><label>Nome da Empresa</label><input type="text" id="empresaNome" placeholder="Ex: Clínica Saúde Lda"></div>
                <div><label>NIF</label><input type="text" id="empresaNif" placeholder="5000123456"></div>
                <div><label>Telefone</label><input type="text" id="empresaTel" placeholder="923 000 000"></div>
                <div><label>Endereço</label><input type="text" id="empresaEnd" placeholder="Luanda, Angola"></div>
            </div>
        </div>

        <div class="card">
            <h3>Dados do Cliente</h3>
            <div class="grid-2">
                <div><label>Nome do Cliente</label><input type="text" id="nomeCliente"></div>
                <div><label>NIF do Cliente</label><input type="text" id="nifCliente" placeholder="999999999"></div>
            </div>
        </div>

        <div class="card">
            <h3>Adicionar Serviço</h3>
            <div class="grid-2">
                <div><label>Descrição</label><input type="text" id="produto" placeholder="Ex: Mensalidade Plano Saúde"></div>
                <div><label>Quantidade</label><input type="number" id="qtd" value="1"></div>
                <div><label>Preço Unitário Kz</label><input type="number" id="preco"></div>
                <div><label>IVA</label><select id="iva"><option value="0">Isento 0%</option><option value="14">IVA 14%</option></select></div>
            </div>
            <button class="btn" onclick="adicionarLinha()">+ Adicionar</button>

            <table class="tabela" id="tabelaItens">
                <thead><tr><th>Descrição</th><th>Qtd</th><th>Preço</th><th>IVA</th><th>Total</th><th></th></tr></thead>
                <tbody></tbody>
            </table>

            <div class="total" id="totais">Total: 0.00 Kz</div>
            <button class="btn btn-azul" onclick="gerarPDF()" style="margin-top: 15px;">Gerar PDF da Fatura</button>
        </div>

        <div class="footer">Desenvolvido por <strong>MILTON TECH</strong></div>
    </div>

    <script>
        let itens = [];
        let numeroFatura = 1;

        function adicionarLinha() {
            const produto = document.getElementById('produto').value;
            const qtd = parseFloat(document.getElementById('qtd').value);
            const preco = parseFloat(document.getElementById('preco').value);
            const ivaPerc = parseFloat(document.getElementById('iva').value);
            if(!produto ||!qtd ||!preco) return alert('Preenche todos campos');
            const base = qtd * preco;
            const iva = base * (ivaPerc / 100);
            const total = base + iva;
            itens.push({produto, qtd, preco, ivaPerc, base, iva, total});
            atualizarTabela();
            document.getElementById('produto').value = '';
            document.getElementById('qtd').value = '1';
            document.getElementById('preco').value = '';
        }

        function atualizarTabela() {
            const tbody = document.querySelector('#tabelaItens tbody');
            tbody.innerHTML = '';
            let totalGeral = 0;
            itens.forEach((item, i) => {
                totalGeral += item.total;
                tbody.innerHTML += `<tr><td>${item.produto}</td><td>${item.qtd}</td><td>${item.preco.toFixed(2)}</td><td>${item.ivaPerc}%</td><td>${item.total.toFixed(2)} Kz</td><td><button class="btn-vermelho" onclick="remover(${i})">X</button></td></tr>`;
            });
            document.getElementById('totais').innerHTML = `<strong>Total da Fatura: ${totalGeral.toFixed(2)} Kz</strong>`;
        }

        function remover(i) { itens.splice(i, 1); atualizarTabela(); }

        function gerarPDF() {
            if(itens.length == 0) return alert('Adiciona serviços primeiro');
            const empresaNome = document.getElementById('empresaNome').value || 'MINHA EMPRESA';
            const empresaNif = document.getElementById('empresaNif').value || '0000000000';
            const empresaTel = document.getElementById('empresaTel').value || '';
            const empresaEnd = document.getElementById('empresaEnd').value || '';
            const nome = document.getElementById('nomeCliente').value || 'Consumidor Final';
            const nif = document.getElementById('nifCliente').value || '999999999';

            let base = 0, iva = 0, total = 0;
            itens.forEach(i => { base += i.base; iva += i.iva; total += i.total; });

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // CABEÇALHO
            doc.setFontSize(18); doc.setFont(undefined, 'bold'); doc.text(empresaNome, 105, 20, {align: 'center'});
            doc.setFontSize(10); doc.setFont(undefined, 'normal');
            doc.text(`NIF: ${empresaNif} | Tel: ${empresaTel}`, 105, 27, {align: 'center'});
            doc.text(`${empresaEnd}`, 105, 33, {align: 'center'});
            doc.line(20, 38, 190, 38);

            // FATURA
            doc.setFontSize(14); doc.setFont(undefined, 'bold'); doc.text('FATURA / RECIBO', 20, 50);
            doc.setFontSize(10); doc.setFont(undefined, 'normal');
            doc.text(`Nº: ${String(numeroFatura).padStart(4,'0')}`, 20, 57);
            doc.text(`Data: ${new Date().toLocaleDateString('pt-AO')}`, 20, 63);

            // CLIENTE
            doc.setFont(undefined, 'bold'); doc.text('CLIENTE:', 110, 50);
            doc.setFont(undefined, 'normal');
            doc.text(`${nome}`, 110, 57);
            doc.text(`NIF: ${nif}`, 110, 63);

            // ITENS
            let y = 78; doc.setFont(undefined, 'bold');
            doc.text('Qtd', 20, y); doc.text('Descrição', 35, y); doc.text('P.Unit', 120, y); doc.text('IVA', 145, y); doc.text('Total', 170, y);
            doc.line(20, y+2, 190, y+2); y += 8; doc.setFont(undefined, 'normal');

            itens.forEach(item => {
                doc.text(`${item.qtd}`, 20, y);
                doc.text(item.produto.substring(0,35), 35, y);
                doc.text(`${item.preco.toFixed(2)}`, 120, y);
                doc.text(`${item.ivaPerc}%`, 145, y);
                doc.text(`${item.total.toFixed(2)}`, 170, y);
                y += 7;
            });

            // TOTAIS
            y += 5; doc.line(120, y, 190, y); y += 7;
            if(iva > 0) {
                doc.text(`Base:`, 120, y); doc.text(`${base.toFixed(2)} Kz`, 190, y, {align: 'right'}); y += 7;
                doc.text(`IVA:`, 120, y); doc.text(`${iva.toFixed(2)} Kz`, 190, y, {align: 'right'}); y += 7;
            }
            doc.setFont(undefined, 'bold'); doc.setFontSize(12);
            doc.text(`TOTAL:`, 120, y); doc.text(`${total.toFixed(2)} Kz`, 190, y, {align: 'right'});

            doc.setFontSize(8); doc.setFont(undefined, 'normal');
            doc.text('Obrigado pela preferência!', 105, 280, {align: 'center'});
            doc.save(`Fatura-${String(numeroFatura).padStart(4,'0')}.pdf`);

            numeroFatura++;
            itens = [];
            atualizarTabela();
        }
    </script>
</body>
    </html>
