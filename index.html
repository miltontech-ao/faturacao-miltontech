<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILTON TECH - Sistema de Faturação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0F172A; color: #E2E8F0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { font-size: 28px; font-weight: bold; }
        .logo .azul { color: #3B82F6; }
        .logo .verde { color: #10B981; }
        .subtitle { color: #94A3B8; font-size: 14px; }
        .card { background: #1E293B; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .card h2 { font-size: 18px; margin-bottom: 5px; }
        .card p { color: #94A3B8; font-size: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin: 12px 0 6px; color: #CBD5E1; }
        input, textarea { width: 100%; padding: 12px; background: #0F172A; border: 1px solid #334155; border-radius: 8px; color: #E2E8F0; font-size: 14px; }
        input:focus { border-color: #3B82F6; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-gerar { width: 100%; padding: 16px; background: linear-gradient(90deg, #3B82F6, #10B981); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; margin-top: 20px; }
        .btn-gerar:active { opacity: 0.8; }
        .item { background: #0F172A; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span class="azul">MILTON</span> <span class="verde">TECH</span></div>
        <div class="subtitle">Sistema de Faturação</div>
        <div style="color:#F87171; font-size:12px; margin-top:5px;">⚠️ Sem ligação à Internet</div>
    </div>

    <div class="card">
        <h2>Dados da Empresa</h2>
        <p>Nome da Empresa</p>
        <input id="emp_nome" placeholder="Ex: Clínica Saúde Lda" value="MILTON TECH, LDA">
        <label>NIF</label>
        <input id="emp_nif" placeholder="5000123456" value="5000123456">
        <label>Telefone</label>
        <input id="emp_tel" placeholder="923 000 000" value="923 000 000">
        <label>Endereço</label>
        <input id="emp_end" placeholder="Luanda, Angola" value="Rua Comandante Gika, Luanda">
    </div>

    <div class="card">
        <h2>Dados do Cliente</h2>
        <p>Nome do Cliente</p>
        <input id="cli_nome" placeholder="Nome completo">
        <label>NIF do Cliente</label>
        <input id="cli_nif" placeholder="999999999" value="999999999">
    </div>

    <div class="card">
        <h2>Itens da Fatura</h2>
        <div class="item">
            <label>Descrição</label>
            <input id="item_desc" placeholder="Licença Software" value="Licença Software Milton Tech Pro">
            <div class="grid">
                <div>
                    <label>Qtd</label>
                    <input id="item_qtd" type="number" value="1">
                </div>
                <div>
                    <label>Preço Unit. Kz</label>
                    <input id="item_preco" type="number" value="200000">
                </div>
            </div>
        </div>
    </div>

    <button class="btn-gerar" onclick="gerarFaturaPro()">🧾 GERAR FATURA AGT 2026</button>
    
    <div id="qrcode" style="display:none;"></div>

<script>
async function gerarFaturaPro() {
    const { jsPDF } = window.jspdf;
    
    // 1. PEGAR DADOS DA TELA
    const empresa = {
        nome: document.getElementById('emp_nome').value,
        nif: document.getElementById('emp_nif').value,
        tel: document.getElementById('emp_tel').value,
        end: document.getElementById('emp_end').value
    };
    const cliente = {
        nome: document.getElementById('cli_nome').value || "Consumidor Final",
        nif: document.getElementById('cli_nif').value || "999999999"
    };
    const item = {
        desc: document.getElementById('item_desc').value,
        qtd: parseFloat(document.getElementById('item_qtd').value),
        preco: parseFloat(document.getElementById('item_preco').value)
    };
    
    if (!empresa.nome || !empresa.nif || !item.desc) {
        alert("Preenche Nome da Empresa, NIF e Descrição do item");
        return;
    }

    // 2. CÁLCULOS AGT 2026
    const numFatura = `FT${new Date().getFullYear()}${String(Date.now()).slice(-6)}`;
    const dataEmissao = new Date().toLocaleString('pt-AO');
    const subtotal = item.qtd * item.preco;
    const iva = subtotal * 0.14;
    const total = subtotal + iva;
    
    // Hash AGT
    const hashDados = `${empresa.nif}${dataEmissao.replace(/[\/\s:]/g,'')}${numFatura}${total.toFixed(2)}`;
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(hashDados));
    const hashHex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase().slice(0,32);
    
    // 3. GERAR QR CODE AGT
    const qrString = `A:${empresa.nif}*B:${cliente.nif}*C:${dataEmissao.replace(/[\/\s:]/g,'')}*D:${numFatura}*E:N*F:${subtotal.toFixed(2)}*G:${iva.toFixed(2)}*H:${total.toFixed(2)}*I:0.00*J:0.00*K:0.00*L:0.00*M:0.00*N:0.00*O:${hashHex}`;
    
    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), { text: qrString, width: 100, height: 100 });
    await new Promise(r => setTimeout(r, 200)); // Espera QR renderizar
    const qrImg = document.getElementById('qrcode').querySelector('img').src;

    // 4. CRIAR PDF PROFISSIONAL NÍVEL PRIMAVERA
    const doc = new jsPDF();
    
    // Cabeçalho Azul
    doc.setFillColor(30, 58, 138);
    doc.rect(0, 0, 210, 25, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(20);
    doc.setFont('helvetica', 'bold');
    doc.text(empresa.nome, 105, 15, { align: 'center' });
    
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Sistema de Facturação Certificado AGT 2026', 105, 30, { align: 'center' });
    
    // Dados Empresa + Fatura - 2 colunas
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('EMPRESA', 15, 45);
    doc.text('FACTURA Nº', 140, 45);
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text(`NIF: ${empresa.nif}`, 15, 52);
    doc.text(empresa.end, 15, 57);
    doc.text(`Tel: ${empresa.tel}`, 15, 62);
    
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text(numFatura, 190, 52, { align: 'right' });
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text(`DATA: ${dataEmissao}`, 190, 60, { align: 'right' });
    
    // Linha
    doc.setDrawColor(200, 200, 200);
    doc.line(15, 68, 195, 68);
    
    // Cliente
    doc.setFont('helvetica', 'bold');
    doc.text('DADOS DO CLIENTE', 15, 76);
    doc.setFont('helvetica', 'normal');
    doc.text(`Nome: ${cliente.nome}`, 15, 83);
    doc.text(`NIF: ${cliente.nif}`, 120, 83);
    
    // Tabela Itens
    doc.setFillColor(30, 58, 138);
    doc.rect(15, 92, 180, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.text('#', 18, 97);
    doc.text('Descrição', 25, 97);
    doc.text('Qtd', 115, 97);
    doc.text('Preço Unit.', 135, 97);
    doc.text('Total', 175, 97);
    
    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'normal');
    doc.text('1', 18, 107);
    doc.text(item.desc, 25, 107);
    doc.text(item.qtd.toString(), 118, 107, { align: 'right' });
    doc.text(`${item.preco.toLocaleString('pt-AO')} Kz`, 165, 107, { align: 'right' });
    doc.text(`${subtotal.toLocaleString('pt-AO')} Kz`, 193, 107, { align: 'right' });
    
    doc.line(15, 100, 195, 100);
    doc.line(15, 110, 195, 110);
    
    // QR + Totais
    doc.addImage(qrImg, 'PNG', 15, 120, 30, 30);
    
    doc.setFont('helvetica', 'normal');
    doc.text('Subtotal:', 140, 125);
    doc.text(`${subtotal.toLocaleString('pt-AO')} Kz`, 193, 125, { align: 'right' });
    doc.text('IVA 14%:', 140, 132);
    doc.text(`${iva.toLocaleString('pt-AO')} Kz`, 193, 132, { align: 'right' });
    
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(30, 58, 138);
    doc.text('TOTAL:', 140, 142);
    doc.text(`${total.toLocaleString('pt-AO')} Kz`, 193, 142, { align: 'right' });
    
    // Rodapé AGT
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text(`Hash AGT: ${hashHex}`, 15, 160);
    doc.text('Software: MILTON TECH PRO v1.0 | Processado por computador', 15, 165);
    doc.text('Documento válido conforme Decreto Presidencial nº 28/20', 105, 280, { align: 'center' });
    
    // 5. SALVAR
    doc.save(`${numFatura}.pdf`);
    alert(`✅ Factura ${numFatura} gerada! Verifica na pasta Download`);
}
</script>
</body>
                </html>
